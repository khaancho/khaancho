<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-sm" style="min-width: 300px; max-width: 400px; width: 100%;">
    <h2 class="text-center mb-4">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" type="text" formControlName="username" class="form-control" [class.is-invalid]="isSubmitted && loginForm.controls['username'].invalid" />
        <div class="invalid-feedback" *ngIf="isSubmitted && loginForm.controls['username'].errors">
          Username is required.
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" [class.is-invalid]="isSubmitted && loginForm.controls['password'].invalid" />
        <div class="invalid-feedback" *ngIf="isSubmitted && loginForm.controls['password'].errors">
          Password is required and must be at least 6 characters.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>

      <div class="alert alert-danger mt-3" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>
    </form>
  </div>
</div>
