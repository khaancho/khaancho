<div class="category-page">
  <h2>Category: {{ categoryName }}</h2>

  <div *ngIf="ads.length; else noAds">
    <div class="ad-list">
      <app-ad-card *ngFor="let ad of ads" [ad]="ad"></app-ad-card>
    </div>
  </div>

  <ng-template #noAds>
    <p>No ads found in this category.</p>
  </ng-template>
</div>
