<div class="contact-container">
  <h2>Contact Us</h2>
  
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Name:</label>
      <input id="name" formControlName="name" type="text" />
      <div class="error" *ngIf="submitted && contactForm.get('name')?.invalid">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input id="email" formControlName="email" type="email" />
      <div class="error" *ngIf="submitted && contactForm.get('email')?.invalid">
        Enter a valid email.
      </div>
    </div>

    <div class="form-group">
      <label for="message">Message:</label>
      <textarea id="message" formControlName="message" rows="5"></textarea>
      <div class="error" *ngIf="submitted && contactForm.get('message')?.invalid">
        Message must be at least 10 characters.
      </div>
    </div>

    <button type="submit">Send Message</button>
  </form>

  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
</div>
