<header [ngClass]="{ 'bg-white border-bottom text-dark': !isDarkMode, 'bg-dark border-bottom text-light': isDarkMode }" class="header py-2">
  <div class="container-fluid px-lg-5">
    <nav [ngClass]="{ 'navbar-light': !isDarkMode, 'navbar-dark': isDarkMode }" class="navbar navbar-expand-lg w-100 gap-3">
      
      <!-- Brand and Toggler -->
      <a routerLink="/" class="navbar-brand fw-bold fs-4 me-3"><span class="fw-bold fs-4">खाँचो</span>
        <small [ngClass]="isDarkMode ? 'text-light': 'text-muted'" class="ms-2 fw-normal fst-italic small small-sm small-md fs-6 fs-md-5">Your Daily Needs, Simplified</small>
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMain"
        aria-controls="navbarMain"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible content -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarMain">
        
        <!-- Left nav items -->
        <ul class="navbar-nav mb-2 mb-lg-0 d-flex flex-column flex-lg-row gap-lg-2">
          <li class="nav-item"><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/about" routerLinkActive="active">About</a></li>
          <li class="nav-item" *ngIf="authService.isLoggedIn()"><a class="nav-link" routerLink="/post-ad" routerLinkActive="active">Post Ad</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/category/electronics" routerLinkActive="active">Ads Categories</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/contact-us" routerLinkActive="active">Contact</a></li>
          
          <!-- Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="accountDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Account</a>
            <ul class="dropdown-menu" aria-labelledby="accountDropdown">
              <li *ngIf="!authService.isLoggedIn()"><a class="dropdown-item" routerLink="/login">Login</a></li>
              <li *ngIf="!authService.isLoggedIn()"><a class="dropdown-item" routerLink="/register">Register</a></li>
              <li *ngIf="authService.isLoggedIn()"><a class="dropdown-item" routerLink="/profile/id">Profile</a></li>
              <li *ngIf="authService.isLoggedIn()"><a class="dropdown-item" role="button" (click)="logout()">Logout</a></li>
            </ul>
          </li>
        </ul>

        <!-- Right section: search + switch -->
        <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
          <app-search-bar></app-search-bar>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeSwitch" (change)="toggleDarkMode()" [checked]="isDarkMode" />
            <label class="form-check-label ms-1" for="darkModeSwitch">
              <i class="bi" [ngClass]="isDarkMode ? 'bi-moon-stars-fill' : 'bi-sun-fill'"></i>
            </label>
          </div>
        </div>

      </div>
    </nav>
  </div>
</header>
