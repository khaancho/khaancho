<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6 text-center">Contact Us</h1>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="max-w-lg mx-auto p-6 bg-base-200 shadow-xl rounded-lg">
    <!-- Name Field -->
    <div class="mb-4">
      <label for="name" class="block text-sm font-medium mb-1">Name</label>
      <input type="text" id="name" formControlName="name"
             class="input input-bordered w-full"
             [ngClass]="{ 'input-error': contactForm.get('name')?.invalid && (contactForm.get('name')?.dirty || contactForm.get('name')?.touched) }">
      <div *ngIf="contactForm.get('name')?.invalid && (contactForm.get('name')?.dirty || contactForm.get('name')?.touched)"
           class="text-error text-xs mt-1">
        <span *ngIf="contactForm.get('name')?.errors?.['required']">Name is required.</span>
      </div>
    </div>

    <!-- Email Field -->
    <div class="mb-4">
      <label for="email" class="block text-sm font-medium mb-1">Email</label>
      <input type="email" id="email" formControlName="email"
             class="input input-bordered w-full"
             [ngClass]="{ 'input-error': contactForm.get('email')?.invalid && (contactForm.get('email')?.dirty || contactForm.get('email')?.touched) }">
      <div *ngIf="contactForm.get('email')?.invalid && (contactForm.get('email')?.dirty || contactForm.get('email')?.touched)"
           class="text-error text-xs mt-1">
        <span *ngIf="contactForm.get('email')?.errors?.['required']">Email is required.</span>
        <span *ngIf="contactForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
      </div>
    </div>

    <!-- Message Field -->
    <div class="mb-6">
      <label for="message" class="block text-sm font-medium mb-1">Message</label>
      <textarea id="message" formControlName="message" rows="4"
                class="textarea textarea-bordered w-full"
                [ngClass]="{ 'textarea-error': contactForm.get('message')?.invalid && (contactForm.get('message')?.dirty || contactForm.get('message')?.touched) }"></textarea>
      <div *ngIf="contactForm.get('message')?.invalid && (contactForm.get('message')?.dirty || contactForm.get('message')?.touched)"
           class="text-error text-xs mt-1">
        <span *ngIf="contactForm.get('message')?.errors?.['required']">Message is required.</span>
        <span *ngIf="contactForm.get('message')?.errors?.['minlength']">Message must be at least 10 characters long.</span>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="text-center">
      <button type="submit" class="btn btn-primary w-full" [disabled]="contactForm.invalid">
        Send Message
      </button>
    </div>
  </form>
</div>
